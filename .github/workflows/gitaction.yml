name: CI-CD Pipeline

on:
  push:
    branches: ["main"]

jobs:

  # -------------------------
  # 1. TEST JOB
  # -------------------------
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      # -------------------------
      # Run Tests + Generate Report
      # -------------------------
      - name: Run Unit Tests
        run: |
          mkdir -p test-results
          npm test -- --json --outputFile=test-results/test-report.json

      # -------------------------
      # Upload Artifact (GitHub)
      # -------------------------
      - name: Upload Test Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-results/test-report.json

      # -------------------------
      # Send TEST REPORT FILE to Slack (PASS)
      # -------------------------
      - name: Slack Test Success + File
        if: success()
        run: |
          curl -F file=@test-results/test-report.json \
          -F "initial_comment=🧪 Unit Tests PASSED" \
          -F channels=${{ secrets.SLACK_CHANNEL_ID }} \
          -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
          https://slack.com/api/files.upload

      # -------------------------
      # Send TEST FAIL to Slack
      # -------------------------
      - name: Slack Test Failure
        if: failure()
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data '{"text":"🧪 Unit Tests FAILED ❌"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}


  # -------------------------
  # 2. SECURITY SCAN (TRIVY)
  # -------------------------
  security-scan:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      # -------------------------
      # FS SCAN (WARN HIGH, FAIL CRITICAL)
      # -------------------------
      - name: Trivy FS Scan
        run: |
          trivy fs --severity HIGH,CRITICAL --exit-code 0 . || true

      # -------------------------
      # Docker Build
      # -------------------------
      - name: Build Docker Image
        run: docker build -t devops-dashboard .

      # -------------------------
      # Image Scan (CRITICAL FAIL)
      # -------------------------
      - name: Trivy Image Scan
        run: |
          trivy image --severity CRITICAL --exit-code 1 devops-dashboard

      # -------------------------
      # Slack Security Success
      # -------------------------
      - name: Slack Security Success
        if: success()
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data '{"text":"🔍 Security Scan PASSED (No CRITICAL issues)"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      # -------------------------
      # Slack Security Failure
      # -------------------------
      - name: Slack Security Failure
        if: failure()
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data '{"text":"🔍 SECURITY ALERT ❌ CRITICAL vulnerabilities found"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}


  # -------------------------
  # 3. BUILD + VERSION + PUSH
  # -------------------------
  build:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      # -------------------------
      # VERSION BUMP
      # -------------------------
      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Bump Version
        run: npm version patch -m "ci: bump version %s"

      # -------------------------
      # Docker Build
      # -------------------------
      - name: Build Docker Image
        run: docker build -t devops-dashboard .

      # -------------------------
      # Docker Login
      # -------------------------
      - name: Docker Login
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USER }}" --password-stdin

      # -------------------------
      # Tag + Push Versioned Image
      # -------------------------
      - name: Push Docker Image
        run: |
          VERSION=$(node -p "require('./package.json').version")

          docker tag devops-dashboard ${{ secrets.DOCKERHUB_USER }}/devops-dashboard:$VERSION
          docker tag devops-dashboard ${{ secrets.DOCKERHUB_USER }}/devops-dashboard:latest

          docker push ${{ secrets.DOCKERHUB_USER }}/devops-dashboard:$VERSION
          docker push ${{ secrets.DOCKERHUB_USER }}/devops-dashboard:latest


  # -------------------------
  # 4. DEPLOY + SLACK
  # -------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            docker-compose pull
            docker-compose up -d --build

      # -------------------------
      # Slack Deployment Notification
      # -------------------------
      - name: Slack Deployment Success
        if: success()
        run: |
          VERSION=$(node -p "require('./package.json').version")

          curl -X POST -H "Content-type: application/json" \
          --data "{
            \"text\": \"🚀 Deployment Successful\\n📦 Version: v$VERSION\\n✔ Deployed to EC2\\n✔ Pipeline Completed\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}
