name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm install

      - name: Run Tests
        working-directory: backend
        run: npm test

  security-scan:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "0"

  build:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-dept: 0

      - name: Get Latest Tag
        id: get_version
        run: |
          git fetch --tags

          latest_tags=$(git tag --sort=-v:refname | grep "^v" | head -n 1)

          if [ -z "$latest_tag" ]; then
            latest_tag="v1.0.0"
          fi

          echo "Latest tag: $latest_tag"
          echo "LATEST=$latest_tag" >> $GITHUB_ENV

      - name: Increment Version
        run: |
          IFS='.' read -r major minor patch <<< "${LATEST#v}"
          path=$((patch + 1))

          NEW_VERSION="v$major.$minor.$patch"

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "Version generated: $NEW_VERSION"

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
            -u "${{ secrets.DOCKERHUB_USER }}" \
            --password-stdin

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USER }}/devops-dashboard:${{ env.NEW_VERSION }} \
            -t ${{ secrets.DOCKERHUB_USER }}/devops-dashboard:latest \
            ./backend

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USER }}/devops-dashboard:${{ env.NEW_VERSION }}
          docker push ${{ secrets.DOCKERHUB_USER }}/devops-dashboard:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy To EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/DevOps-Dashboard
            git pull
            docker compose down
            docker compose up -d --build
