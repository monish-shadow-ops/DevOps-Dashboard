name: CI-CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write  

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm install

      - name: Run Tests
        working-directory: backend
        run: npm test

  security-scan:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "0"

  build:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # IMPORTANT (fixes tag issues)

    # -------------------------
    # GET LATEST TAG
    # -------------------------
      - name: Get Latest Tag
        run: |
          git fetch --tags --force

          latest_tag=$(git tag --list "v*" --sort=-v:refname | head -n 1)

          if [ -z "$latest_tag" ]; then
            latest_tag="v1.0.0"
          fi

          echo "Latest tag: $latest_tag"
          echo "LATEST_TAG=$latest_tag" >> $GITHUB_ENV

    # -------------------------
    # INCREMENT VERSION (PATCH ONLY)
    # -------------------------
      - name: Increment Semantic Version
        run: |
          IFS='.' read -r major minor patch <<< "${LATEST_TAG#v}"

          major=${major:-1}
          minor=${minor:-0}
          patch=${patch:-0}

          patch=$((patch + 1))

          NEW_VERSION="v$major.$minor.$patch"

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "Generated version: $NEW_VERSION"

    # -------------------------
    # CREATE GIT TAG
    # -------------------------
      - name: Create Git Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag $NEW_VERSION
          git push origin $NEW_VERSION

    # -------------------------
    # DOCKER LOGIN
    # -------------------------
      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
            -u "${{ secrets.DOCKERHUB_USER }}" \
            --password-stdin

    # -------------------------
    # BUILD IMAGE (SEMANTIC TAG)
    # -------------------------
      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USER }}/devops-dashboard:${{ env.NEW_VERSION }} \
            -t ${{ secrets.DOCKERHUB_USER }}/devops-dashboard:latest \
            ./backend

    # -------------------------
    # PUSH IMAGE
    # -------------------------
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USER }}/devops-dashboard:${{ env.NEW_VERSION }}
          docker push ${{ secrets.DOCKERHUB_USER }}/devops-dashboard:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy To EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/DevOps-Dashboard
            
            docker compose pull
            docker compose down
            docker compose up -d 
